name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  gates:
    name: Ship-blocking gates (1–13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the no-machine-names denylist (Gate 10)
      - name: Resolve pinned pnpm via Corepack
        run: |
          corepack enable
          corepack prepare --activate
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify pinned runtimes resolve (GREEN-GATE 1)
        run: |
          node -v
          pnpm -v
      - name: Run all ship-blocking gates (1–13)
        run: pnpm run ci

  e2e:
    name: Playwright e2e (Gate 14)
    runs-on: ubuntu-latest
    needs: gates
    steps:
      - uses: actions/checkout@v4
      - run: |
          corepack enable
          corepack prepare --activate
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e (copy-gating · search · theme · responsible-use · credMode)
        run: pnpm test:e2e
