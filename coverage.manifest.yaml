# coverage.manifest.yaml — ABSTRACT technique coverage + archetype-frequency bands.
# NO machine names, NO box hints — coverage is expressed only as technique IDs and
# archetype bands ([CORE/HIGH/MED/LOW]). TJnull/Section-18 framing is a citation
# source, never a data source. Bands: core|high|medium|low.
schemaVersion: 1
bands:
  core: Exam-critical; must resolve to >=1 compiling command and is marked requiredForOscpReadiness.
  high: Frequently useful across the archetype space.
  medium: Situational but worth knowing.
  low: Rare / last-resort.

