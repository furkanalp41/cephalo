# ============================================================
# depth-v4 — nodes re-authored to the §1 DEPTH RUBRIC (multi-tool +
# per-credMode variants + exact flags + operator extras + cross-links).
# The coverage gate resolves each id to an existing technique. Deepen a few
# per tick (depth-before-breadth); demote thin ☑ nodes here as you re-audit.
# ============================================================
depthV4:
  - { id: ad.enum.smb, band: core, note: 'SMB enum across netexec/smbmap/rpcclient/smbclient + signing/null-session/output extras' }
  - { id: ad.credaccess.asreproast, band: core, note: 'AS-REP roast across impacket/netexec/Rubeus + hashcat 18200 + DONT_REQ_PREAUTH/OPSEC notes' }
  - { id: ad.credaccess.kerberoast, band: core, note: 'Kerberoast across impacket/netexec/Rubeus + per-credMode (password/PtH/AES/ticket) + hashcat 13100 + relatedIds' }
  - { id: win.privesc.privs, band: high, note: 'Se* abuse: SeBackup hive-dump + SeImpersonate potato chain (PrintSpoofer/GodPotato/JuicyPotatoNG) + whoami /priv enum + relatedIds' }
  - { id: xcut.shells.upgrade, band: high, note: 'PTY upgrade across python3 pty.spawn / script / stty raw / socat + relatedIds' }
  - { id: ad.enum.bloodhound, band: core, note: 'Collectors across bloodhound.py / SharpHound / netexec --bloodhound + relatedIds' }

# ============================================================
# v2 — ARSENAL / DETERMINISTIC ENGINES (abstract dataset ids; no machine names).
# Consumed by the v2 gates (tool-provenance / advisor-coverage / intent-resolves /
# decision-reachability / nmap-route-coverage), NOT by the legacy gateCoverage.
# ============================================================
v2:
  arsenal: [tool.rubeus, tool.powerview, tool.powerup, tool.printspoofer, tool.godpotato, tool.certipy, tool.netexec, tool.mimikatz, tool.nishang, tool.impacket]
  signals: [sig.win.seimpersonate, sig.win.sebackup, sig.win.sedebug, sig.win.seloaddriver, sig.win.semanagevolume, sig.win.backupoperators, sig.win.serveroperators, sig.linux.sudo_nopasswd, sig.linux.cap_setuid, sig.linux.docker]
  decisions: [dec.win.tokenpriv, dec.linux.privesc, dec.ad.nocreds-to-da]
  cve: [cve.proftpd.135.modcopy, cve.vsftpd.234.backdoor, cve.apache.2449.traversal, cve.pkexec.pwnkit, cve.bash.shellshock]
nmap-routes:   # gate fails if a catalog port has no route whose techniqueIds resolve
  - { id: nmap.route.ftp,      port: 21,   band: high }
  - { id: nmap.route.ssh,      port: 22,   band: high }
  - { id: nmap.route.smb,      port: 445,  band: core }
  - { id: nmap.route.ldap,     port: 389,  band: core }
  - { id: nmap.route.kerberos, port: 88,   band: core }
  - { id: nmap.route.winrm,    port: 5985, band: high }
  - { id: nmap.route.rdp,      port: 3389, band: medium }
  - { id: nmap.route.mssql,    port: 1433, band: high }
  - { id: nmap.route.web,      port: 80,   band: high }

