commands:
  - id: osep.theory.os.info
    title: 'OS build enumeration'
    template: 'Get-CimInstance Win32_OperatingSystem | Select-Object Caption,BuildNumber'
    shell: powershell
    os: [windows]
    tags: [osep]
    danger: info
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
  - id: osep.clientside.office.enum
    title: 'Macro-security policy check'
    template: 'Get-ItemProperty "HKCU:\Software\Policies\Microsoft\Office\16.0\Word\Security"'
    shell: powershell
    os: [windows]
    tags: [osep, evasion]
    danger: medium
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
  - id: osep.clientside.jscript.run
    title: 'Run a JScript file (cscript)'
    template: 'cscript //nologo {{PAYLOAD}}'
    shell: cmd
    os: [windows]
    tags: [osep, evasion]
    danger: medium
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
  - id: osep.inject.process.enum
    title: 'Enumerate session-1 processes'
    template: 'Get-Process | Where-Object { $_.SessionId -eq 1 }'
    shell: powershell
    os: [windows]
    tags: [osep, evasion]
    danger: medium
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
  - id: osep.evasion.intro.status
    title: 'Defender status enumeration'
    template: 'Get-MpComputerStatus | Select-Object RealTimeProtectionEnabled'
    shell: powershell
    os: [windows]
    tags: [osep, evasion]
    danger: info
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
  - id: osep.evasion.applocker.enum
    title: 'Effective AppLocker policy'
    template: 'Get-AppLockerPolicy -Effective -Xml'
    shell: powershell
    os: [windows]
    tags: [osep, evasion]
    danger: medium
    confidence: verified
    references: [ref.osce3.joas, ref.osep.chvancooten]
    packs: [osep]
