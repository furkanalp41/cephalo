    packs: [oswe]
  - id: oswe.method.sourcereview
    title: 'Source-code analysis (white-box)'
    os: [linux]
    phase: web
    summary: 'Sink-to-source review of dangerous functions across the codebase.'
    commands: [oswe.method.sourcereview.grep]
    tags: [web, oswe]
    references: [ref.osce3.joas, ref.oswe.timip]
    confidence: verified
