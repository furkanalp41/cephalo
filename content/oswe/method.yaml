commands:
  - id: oswe.method.tooling.nuclei
    title: 'nuclei — high/critical templates'
    template: 'nuclei -u {{URL}} -severity high,critical'
    shell: bash
    os: [linux]
    tags: [web]
    confidence: verified
    references: [ref.osce3.joas, ref.oswe.timip]
    packs: [oswe]
  - id: oswe.method.sourcereview.grep
    title: 'grep dangerous sinks in source'
    template: 'grep -rniE "(eval|exec|deserialize|unserialize|Runtime\.exec)" {{SOURCE_DIR}}'
    shell: bash
    os: [linux]
    tags: [web]
    confidence: verified
    references: [ref.osce3.joas, ref.oswe.timip]
    packs: [oswe]
