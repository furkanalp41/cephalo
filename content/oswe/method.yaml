techniques:
  - id: oswe.method.tooling
    title: 'Web tooling & methodology'
    os: [linux]
    phase: web
    summary: 'Proxy + scanner setup for white-box web review (OSWE).'
    commands: [oswe.method.tooling.nuclei]
    tags: [web, oswe]
